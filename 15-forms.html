<form action="" method="get" encType="multipart/form-data"> 

<label for="casa">Name:</label>
<input type="text" id="casa" name="casa" autocomplete="street-address">

<label for="numero">Number:</label>
<input type="number" id="numero" name="numero" autocomplete="on">

<label for="email">Email:</label>
<input type="email" id="email" name="email" autocomplete="email">

<label for="file">File:</label>
<input type="file" id="file" name="file" autocomplete="on">


<button type="submit">Submit</button>
</form>
